<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Film & Analisis Sentimen </title>
    <!-- Menggunakan Tailwind CSS versi 4 via Play CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <!-- Header / Navbar -->
    <header class="bg-slate-900 border-b border-slate-800 p-5 sticky top-0 z-50 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider text-indigo-400 flex items-center gap-2">
                🎬 Movie Review Analytics
            </h1>
            <span class="text-xs bg-slate-800 text-slate-400 px-3 py-1 rounded-full border border-slate-700">
                VSS & pgvector Enabled
            </span>
        </div>
    </header>

    <!-- Konten Utama -->
    <main class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Kolom Kiri: Form Tambah Film Baru -->
        <div class="lg:col-span-1">
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl sticky top-24">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-indigo-300">
                    ➕ Tambah Film Baru
                </h2>
                <form id="movie-form" class="space-y-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1 font-medium">Judul Film</label>
                        <input type="text" id="title" required 
                            class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm focus:border-indigo-500 focus:outline-none transition" 
                            placeholder="Contoh: Inception">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1 font-medium">Sinopsis</label>
                        <textarea id="synopsis" required 
                            class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm focus:border-indigo-500 focus:outline-none transition" 
                            placeholder="Contoh: Seorang pencuri yang masuk ke dalam pikiran korban untuk mencuri rahasia..."></textarea>
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1 font-medium">Genre</label>
                        <input type="text" id="genre" required 
                            class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm focus:border-indigo-500 focus:outline-none transition" 
                            placeholder="Contoh: Sci-Fi, Thriller">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1 font-medium">Tahun Rilis</label>
                        <input type="number" id="release_year" required min="1800" max="2100" 
                            class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm focus:border-indigo-500 focus:outline-none transition" 
                            placeholder="Contoh: 2010">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1 font-medium">URL Poster (Opsional)</label>
                        <input type="url" id="poster_url" 
                            class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm focus:border-indigo-500 focus:outline-none transition" 
                            placeholder="Contoh: https://example.com/poster.jpg">
                    </div>
                    <button type="submit" id="submit-btn" 
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition text-sm cursor-pointer shadow-lg shadow-indigo-600/20">
                        Simpan Film
                    </button>
                </form>
            </div>
        </div>

        <!-- Kolom Kanan: Daftar Katalog Film -->
        <div class="lg:col-span-2 space-y-4">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-xl font-bold text-slate-200">Katalog Film</h2>
                <span id="movie-count" class="text-xs text-slate-400 bg-slate-900 px-3 py-1 rounded-md border border-slate-800">
                    0 Film Tersedia
                </span>
            </div>
            
            <!-- Container List Film -->
            <div id="movies-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Data film hasil fetch API akan di-render di sini -->
                <div class="col-span-full py-12 text-center text-slate-500 animate-pulse text-sm">
                    Sedang memuat data katalog film...
                </div>
            </div>
        </div>

    </main>

    <!-- JavaScript Integrasi Backend -->
    <script>
        const BASE_URL = 'http://localhost:5000/api';

        // Panggil fungsi muat data saat halaman pertama kali dibuka
        document.addEventListener('DOMContentLoaded', fetchMovies);

        // 1. Fungsi Mengambil (Read) Semua Film
        async function fetchMovies() {
            const gridContainer = document.getElementById('movies-grid');
            const countBadge = document.getElementById('movie-count');
            
            try {
                const res = await fetch(`${BASE_URL}/movies`);
                if (!res.ok) throw new Error('Gagal mengambil data dari server');
                
                const movies = await res.json();
                countBadge.innerText = `${movies.length} Film Tersedia`;
                gridContainer.innerHTML = '';

                if (movies.length === 0) {
                    gridContainer.innerHTML = `
                        <div class="col-span-full bg-slate-900/50 border border-dashed border-slate-800 rounded-2xl p-8 text-center text-slate-500 text-sm">
                            Belum ada film di katalog. Silakan tambahkan film baru melalui form di samping.
                        </div>
                    `;
                    return;
                }

                movies.forEach(movie => {
                    gridContainer.innerHTML += `
                        <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl flex flex-col justify-between hover:border-slate-700 transition shadow-sm group">
                            
                            <img
                                src="${movie.poster_url}"
                                alt="${movie.title}"
                                class="w-full h-72 object-cover rounded-xl mb-4">
                            <div>
                                <div class="flex justify-between items-start gap-2">
                                    <span class="text-[10px] font-bold uppercase tracking-wider bg-indigo-950 text-indigo-400 px-2.5 py-1 rounded-md border border-indigo-900/50">
                                        ${movie.genre}
                                    </span>
                                    <span class="text-xs text-slate-500 font-medium">
                                        ${movie.release_year}
                                    </span>
                                </div>
                                <h3 class="text-lg font-bold text-slate-100 mt-3 group-hover:text-indigo-400 transition line-clamp-1">
                                    ${movie.title}
                                </h3>
                            </div>
                            
                            <div class="flex items-center gap-2 mt-6 pt-3 border-t border-slate-800/60">
                                <a href="detail.html?id=${movie.id}" 
                                   class="flex-1 text-center bg-slate-800 hover:bg-indigo-600 text-slate-200 hover:text-white text-xs font-medium py-2 rounded-lg transition">
                                    Lihat Review
                                </a>
                                <button onclick="deleteMovie(${movie.id})" 
                                        class="bg-slate-800/40 hover:bg-red-950/60 text-slate-500 hover:text-red-400 border border-transparent hover:border-red-900/50 p-2 rounded-lg transition text-xs cursor-pointer"
                                        title="Hapus Film">
                                    🗑️
                                </button>
                            </div>
                        </div>
                    `;
                });

            } catch (err) {
                console.error(err);
                gridContainer.innerHTML = `
                    <div class="col-span-full bg-red-950/20 border border-red-900/50 rounded-2xl p-6 text-center text-red-400 text-sm">
                        Gagal memuat katalog film. Pastikan server backend Anda sudah berjalan di port 5000.
                    </div>
                `;
            }
        }

        // 2. Fungsi Menambahkan (Create) Film Baru
        document.getElementById('movie-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            const title = document.getElementById('title').value;
            const genre = document.getElementById('genre').value;
            const synopsis = document.getElementById('synopsis').value;
            const release_year = document.getElementById('release_year').value;
            const poster_url = document.getElementById('poster_url').value;

            submitBtn.innerText = "Menyimpan...";
            submitBtn.disabled = true;

            try {
                const res = await fetch(`${BASE_URL}/movies`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        title, 
                        genre,
                        synopsis, 
                        release_year: parseInt(release_year),
                        poster_url 
                    })
                });

                if (res.ok) {
                    document.getElementById('movie-form').reset();
                    // Segarkan list katalog film tanpa reload halaman
                    fetchMovies();
                } else {
                    const errData = await res.json();
                    alert('Gagal menyimpan film: ' + errData.error);
                }
            } catch (err) {
                console.error(err);
                alert('Terjadi kesalahan koneksi ke server.');
            } finally {
                submitBtn.innerText = "Simpan Film";
                submitBtn.disabled = false;
            }
        });

        // 3. Fungsi Menghapus (Delete) Film
        async function deleteMovie(id) {
            if (!confirm('Apakah Anda yakin ingin menghapus film ini beserta seluruh review di dalamnya?')) return;

            try {
                const res = await fetch(`${BASE_URL}/movies/${id}`, {
                    method: 'DELETE'
                });

                if (res.ok) {
                    fetchMovies();
                } else {
                    alert('Gagal menghapus film.');
                }
            } catch (err) {
                console.error(err);
                alert('Terjadi kesalahan saat mencoba menghapus film.');
            }
        }
    </script>
</body>
</html>
